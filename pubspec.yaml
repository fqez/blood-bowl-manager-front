name: blood_bowl_manager
description: Blood Bowl League Manager - Manage your teams, players and leagues

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP & API
  dio: ^5.4.0
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.1.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1

  # Icons
  cupertino_icons: ^1.0.6
  phosphor_flutter: ^2.0.1

  # Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/perks/
    - assets/images/perks/upscaled/
    - assets/images/star_players/
    - assets/teams/
    - assets/teams/amazon/
    - assets/teams/black_orc/
    - assets/teams/bretonnian/
    - assets/teams/chaos_chosen/
    - assets/teams/chaos_dwarf/
    - assets/teams/chaos_renegades/
    - assets/teams/dark_elf/
    - assets/teams/dwarf/
    - assets/teams/elven_union/
    - assets/teams/gnome/
    - assets/teams/goblin/
    - assets/teams/halfling/
    - assets/teams/high_elf/
    - assets/teams/human/
    - assets/teams/imperial_nobility/
    - assets/teams/khorne/
    - assets/teams/lizardmen/
    - assets/teams/necromantic_horror/
    - assets/teams/norse/
    - assets/teams/nurgle/
    - assets/teams/ogre/
    - assets/teams/old_world_alliance/
    - assets/teams/orc/
    - assets/teams/shambling_undead/
    - assets/teams/skaven/
    - assets/teams/snotling/
    - assets/teams/tomb_kings/
    - assets/teams/underworld_denizens/
    - assets/teams/vampire/
    - assets/teams/wood_elf/
    - assets/fonts/
    - assets/data.json

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
    - family: PlaywriteCU
      fonts:
        - asset: assets/fonts/PlaywriteCU-Regular.ttf
